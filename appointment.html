<!DOCTYPE html>
<html>
<head>
<title>Appointment Booking</title>
<style>
body{
    font-family:Arial;
    background:#f4f6f8;
}
.box{
    width:400px;
    margin:80px auto;
    background:white;
    padding:30px;
    border-radius:10px;
}
h2{
    text-align:center;
    color:#0a4d68;
}
input, select{
    width:100%;
    padding:10px;
    margin:10px 0;
}
button{
    width:100%;
    padding:10px;
    background:#0a4d68;
    color:white;
    border:none;
}
</style>
</head>

<body>

<div class="box">
<h2>Book Appointment</h2>

<form>
    <input type="text" placeholder="Patient Name" required>
    <select>
        <option>Dr. Ahmed (Cardiology)</option>
        <option>Dr. Sara (Neurology)</option>
        <option>Dr. Ali (Orthopedic)</option>
         <option>Dr. Ahmed (Cardiology)</option>
        <option>Dr. Sara (Neurology)</option>
        <option>Dr. Ali (Orthopedic)</option>
         <option>Dr. Ahmed (Cardiology)</option>
        <option>Dr. Sara (Neurology)</option>
        <option>Dr. Ali (Orthopedic)</option>
        

    </select>
    <input type="date" required>
    <input type="time" required>
    <button>Book Appointment</button>
</form>

</div>

</body>
</html>
